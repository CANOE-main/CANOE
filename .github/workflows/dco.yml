name: DCO Check
on: workflow_call

jobs:
  dco:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify DCO sign-offs
        run: |
          set -euo pipefail
          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'

          echo "Base: $base_sha" >&2
          echo "Head: $head_sha" >&2
          git fetch --no-tags --prune origin "$base_sha" "$head_sha" || true
      
          missing=$(
            git log --format='%H' "${base_sha}..${head_sha}" |
            while read -r c; do
              echo "---- checking commit: $c ----" >&2
              msg="$(git show -s --format=%B "$c")"
              echo "$msg" | sed 's/^/    /' >&2
      
              if printf '%s' "$msg" | git interpret-trailers --parse | grep -iq '^signed-off-by:'; then
                :  # ok
              else
                echo "$c"   # <-- ONLY the SHA goes to stdout (captured into $missing)
                echo "$msg" 
              fi
            done
          )

          if [ -n "$missing" ]; then
            echo
            echo "❌ Missing DCO sign-off in commit(s):"
            echo "$missing"
            echo
            echo "Fix latest commit:"
            echo "  git commit --amend -s --no-edit && git push --force-with-lease"
            echo "Fix multiple commits:"
            echo "  git rebase -i ${base_sha}  # add -s to each, then push --force-with-lease"
            exit 1
          fi

          echo "✅ All commits contain a Signed-off-by trailer."
